<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Delegate</title>
</head>

<body>
    <h1>Explore Event Delegate</h1>

    <section>
        <ul id="list-container">
            <li class="item">Lorem, ipsum dolor.</li>
            <li class="item">Similique, hic qui.</li>
            <li class="item">Ea, repellat a?</li>
            <li class="item">Vel, sed quia?</li>
            <li class="item">Id, iusto facere?</li>
            <li class="item">Sunt, obcaecati delectus?</li>
        </ul>
        <button id="add-btn">Add Item</button>
    </section>

    <script>
        // const items = document.getElementsByClassName('item');
        // for(const item of items){
        //     item.addEventListener('click', function(event){
        //         event.target.parentNode.removeChild(event.target);
        //     })
        // }

        document.getElementById('list-container').addEventListener('click', function(event){
            event.target.parentNode.removeChild(event.target);
        })

        document.getElementById('add-btn').addEventListener('click', function(){
            const listContainer = document.getElementById('list-container');

            const li = document.createElement('li');
            li.innerText = 'Added New List Item';
            li.classList.add('item')
            listContainer.appendChild(li);
        })
    </script>
</body>

</html>
