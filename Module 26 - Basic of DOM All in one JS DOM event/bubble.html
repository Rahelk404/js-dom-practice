<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Bubble</title>
    <style>
        
        #item-2{
            border: 2px solid rebeccapurple;
        }
        ul{
            border: 2px solid red;
        }
        body{
            border: 2px solid green;
        }
        section{
            border: 2px solid blue;
        }
    </style>
</head>

<body id="body">
    <h1>Exploring Event Bubble</h1>
    <section id="section-container">
        <ul id="list-ul">
            <li id="item-1">Lorem, ipsum.</li>
            <li id="item-2">Culpa, unde.</li>
            <li id="item-3">Minus, culpa!</li>
            <li id="item-4">Commodi, labore?</li>
            <li id="item-5">Autem, laudantium.</li>
            <li id="item-6">Reprehenderit, quae.</li>
        </ul>
    </section>

    <script>
        document.getElementById('item-2').addEventListener('click', function(event){
            console.log('item 2 clicked');
            event.stopPropagation();
        })
        document.getElementById('item-2').addEventListener('click', function(event){
            console.log('item 2 second clicked');
           event.stopImmediatePropagation();
        })
        document.getElementById('item-2').addEventListener('click', function(event){
            console.log('item 2 third clicked');
           
        })
        document.getElementById('item-2').addEventListener('click', function(event){
            console.log('item 2 fourth clicked');
           
        })
        document.getElementById('list-ul').addEventListener('click', function(){
            console.log('List Ul clicked');
        })
        document.getElementById('section-container').addEventListener('click', function(){
            console.log('Section Container clicked');
        })
        document.getElementById('body').addEventListener('click', function(){
            console.log('Body Container clicked');
        })
    </script>
</body>

</html>
