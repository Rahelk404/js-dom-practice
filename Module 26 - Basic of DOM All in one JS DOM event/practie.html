<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS DOM EVENT</title>

</head>

<body>
    <h1 onclick="console.log('I am clicked');">Make one Oneclick</h1>
    <button title="This is Tooltip" onclick="console.log('7');">Click me</button>
    <button onclick="console.log(65);">Another Button</button>

    <br>
    <br>

    <button
        onclick="document.body.style.backgroundColor = 'yellow', document.body.style.alignItems = 'center', document.body.style.alignContent = 'center', document.body.style.justifyItems = 'center'">Make
        Yellow</button>

    <!-- option: 2 -->

    <button onclick="makeRed()">Make red</button>
    <!-- option 3 -->
     <button id="make-blue">Make Blue</button>
    <button id="make-purple">Make Purple</button>
    <button id="make-goldenrode">Make Goldenrode</button>
    <!-- option 4 -->
     <button id="make-pink">Make Pink</button>
    <button id="make-green">Make Green</button>
    <script>
        function makeRed() {
            document.body.style.backgroundColor = 'red';
            document.body.style.color = 'white';
            document.body.style.margin = '50px';
        }

       //option 3

       const makeBlueButton = document.getElementById('make-blue');
        makeBlueButton.onclick = makeBlue;

       function makeBlue(){
        document.body.style.backgroundColor = 'blue';
       }

     const makePurpleButtton = document.getElementById('make-purple');
     makePurpleButtton.onclick = function makePurple(){
        document.body.style.backgroundColor = 'purple';
     }

    //   const makePurple = document.getElementById('make-purple');
    //   makePurple.onclick = function (){
    //     document.body.style.backgroundColor = 'purple';
    //   }

    //option 4

   const makePink = document.getElementById('make-pink');

   makePink.addEventListener('click', pinkBtn);

   function pinkBtn(){
    document.body.style.backgroundColor = 'pink';
   }

   const makeGreenBtn = document.getElementById('make-green');
   makeGreenBtn.addEventListener('click', function makeGreen(){
    document.body.style.backgroundColor = 'green';
    document.body.style.margin = '0px'
    document.body.style.textAlign = '';
    document.body.style.alignContent = '';
    document.body.style.alignItems = '';
    document.body.style.justifyItems = '';
   })

   const makeGoldenrodeBtn = document.getElementById('make-goldenrode');

 makeGoldenrodeBtn.addEventListener('click', function(){
    document.body.style.backgroundColor = 'goldenrod';
 })
    </script>
</body>

</html>
