<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- CSS Style Sheet -->
     <link rel="stylesheet" href="style/styles.css">
</head>

<body>
    <header>

    </header>

   <main id="main-content">

        <section>
            <h1 id="section-id" >My awesome DOM</h1>
            <ul>
                <li>Jalali set</li>
                <li>Shafayet</li>
                <li>bonobash</li>
                <li>dom de re baba</li>
            </ul>
        </section>

        <section class="fruits-container">
            <h1 id="fruits-title" class="blue-bg some-class other-class">Fruits</h1>
            <ul>
                <li>apple</li>
                <li>Banana</li>
                <li>Carrot</li>
            </ul>
        </section>
        <section id="places-container" class="large-text">
            <h1 id="places-title">Places I like to visit</h1>
            <ul id="places-list">
                <li class="important-places">Sundarban</li>
                <li class="important-places">Bandorban</li>
                <li class="important-places">Katabon</li>
                <li class="other-places">Shalbon </li>
            </ul>
        </section>
    </main>

    <script src="js/style.js"></script>
    <script>
        const liCollection = document.getElementsByTagName('li');
        console.log(liCollection);
    
        const allHeading = document.getElementsByTagName('h1');
        for(let h1 of allHeading){
            console.log(h1.innerText);
        }

        const fruitsTitle = document.getElementById('fruits-title');
        fruitsTitle.innerText = 'Fruits Change by JS';
        fruitsTitle.setAttribute('fruitsTitle', 'This is powered by js');

        const places = document.getElementsByClassName('important-places');
        for(const place of places){
            console.log(place.innerText);
        }

        const someLi = document.querySelectorAll('.fruits-container li')
        for(const li of someLi){
            console.log(li.innerText);
        }
    </script>
</body>

</html>
